name: CD

on:
  release:
    types: [published]

jobs:

  setup:
    name: Setup environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - run: pip install -r gdown

      - run: gdown --fuzzy "$GOOGLE_DRIVE_LINK" -O dataset.tar
        env:
          GOOGLE_DRIVE_LINK: ${{ secrets.GOOGLE_DRIVE_LINK }}

      - uses: actions/upload-artifact@v4
        with:
          name: dataset
          path: dataset.tar
          retention-days: 1

  preprocess:
    name: Preprocess data
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dataset

      - uses: geekyeggo/delete-artifact@v5
        with:
          name: dataset

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: |
          mkdir -p _data
          tar -xf dataset.tar -C _data

      - run: make _temp/MeanProfiles.h5
